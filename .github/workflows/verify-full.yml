# Full verification = E0 evidence anchor (ADR-065 Q4: แปลง session evidence เป็น CI artifact)
# ผูก commit + environment + วันที่ + ผลเทสต์ ลง artifact — ใช้ปิดสถานะ "E0 candidate / REVERIFY"
#
# FS-R2-B1-01: this now runs on governance candidates too, and enforces every
# local gate as a separate job (root, node-native controls, server, field,
# clean worktree, E2E smoke, manifest integrity) so the workflow's coverage
# matches its name and the reviewed HEAD gets a real external attestation.
name: MONOLITH Full Verify

on:
  push:
    branches: [main, "fix/**", "s17/**", "governance/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: root — typecheck + vitest + build (+ evidence)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (root)
        run: npm ci
      # server/ อยู่นอก npm workspaces — ต้องติดตั้งแยก ไม่งั้นเทสต์ที่ใช้ yazl fail
      - name: Install dependencies (server)
        run: npm ci
        working-directory: server
      - name: Typecheck (full project)
        run: npx tsc -b tsconfig.build.json
      - name: Unit tests (root Vitest suite)
        run: npm run test:run -- --reporter=default --reporter=json --outputFile=vitest-report.json
      - name: Build
        run: npm run build
      - name: Assemble evidence manifest
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          let report = null;
          try { report = JSON.parse(fs.readFileSync('vitest-report.json', 'utf8')); } catch {}
          const evidence = {
            evidenceTier: 'E0',
            workflow: 'verify-full/root',
            commit: process.env.GITHUB_SHA,
            ref: process.env.GITHUB_REF,
            runId: process.env.GITHUB_RUN_ID,
            runUrl: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
            environment: 'ubuntu-latest / node ' + process.version,
            timestamp: new Date().toISOString(),
            tests: report ? {
              total: report.numTotalTests,
              passed: report.numPassedTests,
              failed: report.numFailedTests,
              suites: report.numTotalTestSuites,
              success: report.success,
            } : 'vitest-report.json missing',
          };
          fs.writeFileSync('verify-evidence.json', JSON.stringify(evidence, null, 2));
          console.log(JSON.stringify(evidence, null, 2));
          "
      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verify-evidence-${{ github.sha }}
          path: |
            verify-evidence.json
            vitest-report.json
          retention-days: 90

  node-controls:
    name: node-native controls (governance tooling + schema)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Node-native control tests (node:test)
        run: npm run test:node

  server:
    name: factory server — build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (server)
        run: npm ci
        working-directory: server
      - name: Server build (tsc)
        run: npm run build
        working-directory: server
      - name: Server tests
        run: npm run test:run
        working-directory: server

  field:
    name: field app — build + test gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Field app tests
        run: npm run test:run -w @daph/field-app
      - name: Field app build
        run: npm run build -w @daph/field-app

  clean-worktree:
    name: hermetic build — clean worktree (FS-B2-04)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Assert working tree is clean after build
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::build dirtied the working tree — tracked release bytes regenerated"
            git status --porcelain
            exit 1
          fi
          echo "working tree clean after build"

  e2e-smoke:
    name: e2e @smoke (Designer critical path)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium + OS deps
        run: npx playwright install --with-deps chromium
      - name: Run e2e @smoke (Playwright auto-starts the vite dev server)
        run: npx playwright test --grep @smoke --reporter=list

  manifests:
    name: governance manifest integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Verify CT-DEC governance manifests (byte-exact, sorted, no traversal)
        run: |
          set -e
          shopt -s nullglob
          for m in docs/governance/*.sha256; do
            echo "verifying $m"
            node scripts/verify-sha256-manifest.mjs "$m"
          done
